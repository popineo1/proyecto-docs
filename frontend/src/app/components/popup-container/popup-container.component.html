@if (show()) {
  <div
    class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-0 sm:items-center sm:p-4"
    (click)="onBackdropClick()"
  >
    <div
      class="flex min-h-0 w-full flex-col overflow-hidden rounded-t-2xl border border-[var(--border-color)] bg-[var(--bright-bg-color)] shadow-xl sm:rounded-2xl"
      [ngClass]="[widthCls(), heightCls()]"
      (click)="$event.stopPropagation()"
    >
      @if (popupTitle() || popupSubtitle() || showCloseButton()) {
        <div class="shrink-0 border-b border-[var(--border-color)] px-4 py-4 sm:px-6 sm:py-5">
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
              @if (popupTitle()) {
                <h3 class="text-lg font-semibold sm:text-xl">
                  {{ popupTitle() }}
                </h3>
              }

              @if (popupSubtitle()) {
                <p class="mt-1 text-sm text-[var(--dark-gray-color)]">
                  {{ popupSubtitle() }}
                </p>
              }
            </div>

          </div>
        </div>
      }

      <div class="min-h-0 flex-1 overflow-auto px-4 py-4 sm:px-6 sm:py-5">
        <ng-content></ng-content>
      </div>

      <div class="shrink-0 border-t border-[var(--border-color)] px-4 py-4 sm:px-6">
        <ng-content select="[popup-footer]"></ng-content>
      </div>
    </div>
  </div>
}
