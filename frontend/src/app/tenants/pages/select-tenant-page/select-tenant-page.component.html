<div class="space-y-5 sm:space-y-6">
  <div>
    <h1 class="text-2xl font-semibold sm:text-3xl">Selecciona empresa</h1>
    <p class="mt-2 text-sm sm:text-base text-[var(--dark-gray-color)]">
      Elige con qué tenant quieres trabajar
    </p>
  </div>

  <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
    @for (tenant of tenants(); track tenant.tenant_id) {
      <button
        type="button"
        class="rounded-2xl border border-[var(--border-color)] bg-[var(--bright-bg-color)] p-4 text-left shadow-sm transition hover:border-[var(--primary-color)] hover:bg-[var(--blue-selected)] sm:p-5"
        (click)="selectTenant(tenant.tenant_id)"
      >
        <h3 class="text-lg font-semibold break-words">{{ tenant.tenant_name }}</h3>
        <p class="mt-2 text-sm break-words text-[var(--dark-gray-color)]">{{ tenant.tenant_slug }}</p>
        <p class="mt-2 text-xs uppercase tracking-wide text-[var(--primary-color)]">{{ tenant.role }}</p>
      </button>
    }
  </div>
</div>
